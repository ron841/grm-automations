name: Weekly Content Calendar

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run content calendar script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python content_calendar.py

      - name: Commit output file
        run: |
          git config user.name "GRM Automation"
          git config user.email "ron@getrootedmedia.com"
          git add -f output/
          git commit -m "Weekly content calendar $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push
