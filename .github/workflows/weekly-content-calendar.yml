# ──────────────────────────────────────────────────────────────────────
# Weekly Content Calendar — GitHub Actions Workflow
# ──────────────────────────────────────────────────────────────────────
# Runs content_calendar.py every Sunday at 1am UTC to generate the
# upcoming week's Instagram content calendar for @getrootedmedia.
# The output markdown file is committed back to the repo automatically.
#
# Requirements:
#   - Add your Anthropic API key as a GitHub secret named ANTHROPIC_API_KEY
#     (Settings → Secrets and variables → Actions → New repository secret)
# ──────────────────────────────────────────────────────────────────────

name: Weekly Content Calendar

# ──────────────────────────────────────────────────────────────────────
# TRIGGERS — when this workflow runs
# ──────────────────────────────────────────────────────────────────────
on:
  # Scheduled: every Sunday at 1:00 AM UTC
  schedule:
    - cron: "0 1 * * 0"

  # Manual: lets you click "Run workflow" in the GitHub Actions tab
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────
# JOBS — the steps that execute
# ──────────────────────────────────────────────────────────────────────
# ──────────────────────────────────────────────────────────────────────
# PERMISSIONS — allow the workflow to push commits back to the repo
# ──────────────────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repo with a token that has push permission
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Step 3: Install the anthropic SDK
      - name: Install dependencies
        run: pip install anthropic

      # Step 4: Run the script (reads API key from environment)
      - name: Generate weekly content calendar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python content_calendar.py

      # Step 5: Verify the output file was created
      - name: Verify output file exists
        run: |
          echo "Listing output/content_calendar/ directory:"
          ls -la output/content_calendar/
          LATEST=$(ls -1 output/content_calendar/*.md 2>/dev/null | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::error::No calendar file found in output/content_calendar/"
            exit 1
          fi
          echo "Latest file: $LATEST"
          head -20 "$LATEST"

      # Step 6: Commit and push the generated markdown file back to the repo
      - name: Commit and push calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          # Only commit if there are changes (avoids failing on no-op runs)
          git diff --staged --quiet || git commit -m "chore: add weekly content calendar $(date +%Y-%m-%d)"
          git push

      # Step 7: Failure notification.
      # Creates a visible annotation in the Actions UI so Ron can
      # quickly see what went wrong. GitHub also emails on failure
      # when Actions notifications are enabled in Settings.
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly Content Calendar workflow FAILED."
          echo "::error::Check the logs above to see which step failed."
          echo ""
          echo "Common fixes:"
          echo "  - ANTHROPIC_API_KEY not set: Go to Settings > Secrets > Actions"
          echo "  - API error: Check your Anthropic account at console.anthropic.com"
          echo "  - Python error: Check content_calendar.py for syntax issues"
